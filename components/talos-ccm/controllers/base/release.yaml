---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: siderolabs
spec:
  interval: 1h
  releaseName: talos-cloud-controller-manager
  chartRef:
    kind: OCIRepository
    name: talos-ccm
  values:
    enabledControllers:
      - node-csr-approval
    tolerations:
      - effect: NoSchedule
        key: node-role.kubernetes.io/control-plane
        operator: Exists
      - effect: NoSchedule
        key: node.cloudprovider.kubernetes.io/uninitialized
        operator: Exists
      - effect: NoSchedule
        key: node.kubernetes.io/not-ready
        operator: Exists
