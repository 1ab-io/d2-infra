apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: kube-system
resources:
  - repository.yaml
  - release.yaml
patches:
  - patch: |
      - op: replace
        path: /metadata/labels/pod-security.kubernetes.io~1enforce
        value: privileged
    target:
      kind: Namespace
      name: kube-system
